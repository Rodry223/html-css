<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplemente aumantar e diminuir o tamanho do navegador</p>
<picture>
    <img src media="(max-width: 1000px)" srcset="imagens/foto-m.png" type="image/">
    <img src="imagens/foto-g.png" alt="Imagem flexivel">
</picture>
<h1>Reproduzindo Audio</h1>
<p>Vamos aprender a reproduzir audios em HTML5</p>
<audio src="midia/happy-mistake.mp3" controls autoplay></audio>


</body>
</html>
